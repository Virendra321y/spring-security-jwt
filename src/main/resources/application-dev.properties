# Database Configuration for Dev Environment
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jwt_tct_dev}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:dev_user}
spring.datasource.password=${DB_PASSWORD:dev_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Server Port
server.port=8081

# AWS Configuration
# Access key and secret key are loaded from environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:dev-access-key-placeholder}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:dev-secret-key-placeholder}
# Region for AWS services
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
# S3 Bucket configuration
spring.cloud.aws.s3.bucket=${AWS_S3_BUCKET:dev-s3-bucket-placeholder}
