# Database Configuration for Prod Environment
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:jwt_tct_prod}?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Server Port
server.port=8082

# AWS Configuration
# Access key and secret key must be provided via environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
# Region for AWS services
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
# S3 Bucket configuration
spring.cloud.aws.s3.bucket=${AWS_S3_BUCKET}
